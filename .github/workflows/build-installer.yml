name: Build Extension Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the release (e.g. v1.0.0). Leave blank to auto-generate a manual-YYYYMMDD-HHMMSS tag."
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Build .mcpb bundle
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            sanitized="$(printf '%s' '${{ github.event.inputs.version }}' | tr -d '\n' | tr -c 'A-Za-z0-9._-' '-')"
            echo "tag=$sanitized" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-mcp-${{ steps.version.outputs.tag }}
          path: email-mcp.mcpb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: email-mcp-${{ needs.build.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: email-mcp.mcpb
          generate_release_notes: true
